<h2>Exam List</h2>

<a href="{% url 'add_exam' %}">Add Exam</a>

<table>
    <tr>
        <th>Title</th>
        <th>Subject</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for exam in exams %}
    <tr>
        <td>{{ exam.title }}</td>
        <td>{{ exam.subject }}</td>
        <td>{{ exam.date }}</td>
        <td>
            <a href="{% url 'delete_exam' exam.id %}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
